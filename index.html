var filters = {
    org: '全部',
    grade: '全部',
    subject: '全部',
    lectures: ['全部']
};

var mode = 'single';

function makeBtns(containerId, type, items) {
    var div = document.getElementById(containerId);
    ['全部'].concat(items).forEach(function(v) {
        var btn = document.createElement('button');
        btn.textContent = v;
        btn.className = v === '全部' ? 'on' : '';
        btn.onclick = function() { setFilter(type, v, this); };
        div.appendChild(btn);
    });
}

function initFilters() {
    makeBtns('orgBtns', 'org', D.orgs);
    makeBtns('gradeBtns', 'grade', D.grades);
    makeBtns('subjectBtns', 'subject', D.subjects);
    
    var lectureDiv = document.getElementById('lectureBtns');
    ['全部'].concat(D.lectures).forEach(function(l) {
        var btn = document.createElement('button');
        btn.textContent = l;
        btn.className = l === '全部' ? 'on' : '';
        btn.onclick = function() { setLectureFilter(l, this); };
        lectureDiv.appendChild(btn);
    });
}

function setFilter(type, value, btn) {
    filters[type] = value;
    var parent = btn.parentNode;
    for (var i = 0; i < parent.children.length; i++) parent.children[i].className = '';
    btn.className = 'on';
    refreshAll();
}

function setLectureFilter(value, btn) {
    if (mode === 'single') {
        filters.lectures = [value];
        var parent = btn.parentNode;
        for (var i = 0; i < parent.children.length; i++) parent.children[i].className = '';
        btn.className = 'on';
    } else {
        if (value === '全部') {
            filters.lectures = ['全部'];
            var parent = btn.parentNode;
            for (var i = 0; i < parent.children.length; i++) parent.children[i].className = '';
            btn.className = 'on';
        } else {
            var idxAll = filters.lectures.indexOf('全部');
            if (idxAll > -1) filters.lectures.splice(idxAll, 1);
            var parent = btn.parentNode;
            if (parent.children[0].className === 'on') parent.children[0].className = '';
            var idx = filters.lectures.indexOf(value);
            if (idx > -1) { filters.lectures.splice(idx, 1); btn.className = ''; }
            else { filters.lectures.push(value); btn.className = 'on'; }
            if (filters.lectures.length === 0) {
                filters.lectures = ['全部'];
                parent.children[0].className = 'on';
            }
        }
    }
    refreshAll();
}

function setMode(m) {
    mode = m;
    document.getElementById('mS').className = m === 'single' ? 'on' : '';
    document.getElementById('mM').className = m === 'multi' ? 'on' : '';
    filters.lectures = ['全部'];
    var lectureDiv = document.getElementById('lectureBtns');
    for (var i = 0; i < lectureDiv.children.length; i++)
        lectureDiv.children[i].className = i === 0 ? 'on' : '';
    refreshAll();
}

function getFilteredData() {
    var records = D.records;
    if (filters.org !== '全部')
        records = records.filter(function(r) { return r.org === filters.org; });
    if (filters.grade !== '全部')
        records = records.filter(function(r) { return r.grade === filters.grade; });
    if (filters.subject !== '全部')
        records = records.filter(function(r) { return r.subject === filters.subject; });
    if (filters.lectures.indexOf('全部') === -1)
        records = records.filter(function(r) { return filters.lectures.indexOf(r.lecture) > -1; });
    return records;
}

// 聚合：按(学科, 中心)汇总（已筛选过的记录）
function aggregateBySubjectOrg(records) {
    var agg = {};
    records.forEach(function(r) {
        var key = r.subject + '_' + r.org;
        if (!agg[key]) agg[key] = { stu:0, att:0, eff:0, hw_sub:0, hw_corr:0, growth:0, count:0 };
        agg[key].stu += r.stu; agg[key].att += r.att; agg[key].eff += r.eff;
        agg[key].hw_sub += r.hw_sub; agg[key].hw_corr += r.hw_corr;
        agg[key].growth += r.growth; agg[key].count++;
    });
    for (var key in agg) {
        if (agg[key].count > 0) agg[key].growth = agg[key].growth / agg[key].count;
        else agg[key].growth = 0;
    }
    return agg;
}

function refreshAll() {
    var records = getFilteredData();
    var agg = aggregateBySubjectOrg(records);
    updateDataBars('eff', agg);
    updateDataBars('hw', agg);
    updateDataBars('growth', agg);
    updateHeatmap('eff', agg);
    updateHeatmap('hw', agg);
}

function updateDataBars(type, agg) {
    var prefix = type === 'eff' ? 'eff' : (type === 'hw' ? 'hw' : 'gr');
    D.subjects.forEach(function(subject) {
        D.orgs.forEach(function(org) {
            var key = subject + '_' + org;
            var data = agg[key];
            var valEl = document.getElementById(prefix + '_' + key + '_val');
            var barEl = document.getElementById(prefix + '_' + key + '_bar');
            if (!valEl || !barEl) return;
            var val = '0%', percent = 0;
            if (data && data.stu > 0) {
                if (type === 'eff') {
                    var pct = (data.eff / data.stu * 100);
                    val = pct.toFixed(2) + '%';
                    percent = Math.min(100, pct);
                } else if (type === 'hw') {
                    var pct = (data.hw_corr / data.stu * 100);
                    val = pct.toFixed(2) + '%';
                    percent = Math.min(100, pct);
                } else {
                    var pct = data.growth;
                    val = (pct > 0 ? '+' : '') + pct.toFixed(2) + '%';
                    percent = Math.min(100, Math.max(0, 50 + pct));
                }
            }
            valEl.textContent = val;
            barEl.style.width = percent + '%';
        });
    });
}

function updateHeatmap(type, agg) {
    var tableId = type === 'eff' ? 'hmEff' : 'hmHw';
    var tbody = document.getElementById(tableId);
    if (!tbody) return;
    tbody.innerHTML = '';
    
    D.orgs.forEach(function(org) {
        var tr = document.createElement('tr');
        var tdOrg = document.createElement('td');
        tdOrg.textContent = org;
        tdOrg.style.fontWeight = 'bold';
        tr.appendChild(tdOrg);
        
        D.subjects.forEach(function(subject) {
            var key = subject + '_' + org;
            var data = agg[key];
            var td = document.createElement('td');
            if (data && data.stu > 0) {
                var v = type === 'eff' ? (data.eff / data.stu * 100) : (data.hw_corr / data.stu * 100);
                td.textContent = v.toFixed(2) + '%';
                // 按列排名
                var colVals = [];
                D.orgs.forEach(function(o) {
                    var k = subject + '_' + o;
                    var d = agg[k];
                    if (d && d.stu > 0) {
                        colVals.push({ org: o, val: type === 'eff' ? (d.eff/d.stu*100) : (d.hw_corr/d.stu*100) });
                    }
                });
                colVals.sort(function(a,b) { return b.val - a.val; });
                var rank = colVals.findIndex(function(x) { return x.org === org; });
                if (rank === 0) td.className = 'g1';
                else if (rank === 1) td.className = 'g2';
                else td.className = 'g3';
            } else {
                td.textContent = '-';
                td.className = 'na';
            }
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
}

window.onload = function() {
    initFilters();
    refreshAll();
};

    </script>
    
    <script>

function initDataBars() {
    var types = [
        { prefix:'eff', container:'effBars' },
        { prefix:'hw',  container:'hwBars' },
        { prefix:'gr',  container:'growthBars' }
    ];
    types.forEach(function(tp) {
        var container = document.getElementById(tp.container);
        if (!container) return;
        container.innerHTML = '';
        D.subjects.forEach(function(subject) {
            var sg = document.createElement('div');
            sg.className = 'sg';
            var h3 = document.createElement('h3');
            h3.textContent = subject;
            sg.appendChild(h3);
            D.orgs.forEach(function(org) {
                var br = document.createElement('div');
                br.className = 'br';
                var bl = document.createElement('div');
                bl.className = 'bl';
                var sp = document.createElement('span');
                sp.textContent = org;
                bl.appendChild(sp);
                var vl = document.createElement('span');
                vl.className = 'vl';
                vl.id = tp.prefix + '_' + subject + '_' + org + '_val';
                vl.textContent = '0%';
                bl.appendChild(vl);
                br.appendChild(bl);
                var pb = document.createElement('div');
                pb.className = 'pb';
                var pf = document.createElement('div');
                pf.className = 'pf';
                pf.id = tp.prefix + '_' + subject + '_' + org + '_bar';
                pf.style.width = '0%';
                pb.appendChild(pf);
                br.appendChild(pb);
                sg.appendChild(br);
            });
            container.appendChild(sg);
        });
    });
}
initDataBars();

    </script>
