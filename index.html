  var bAll=document.createElement('span');bAll.className='bn on';bAll.setAttribute('data-v','');bAll.textContent='全部';

function handleClick(btn,t){
  if(mode==='single'){
    var sib=btn.parentElement.children;for(var i=0;i<sib.length;i++)sib[i].classList.remove('on');
    btn.classList.add('on');
    sel[t]=[btn.getAttribute('data-v')===''?'全部':btn.getAttribute('data-v')];
  }else{
    if(btn.getAttribute('data-v')===''){
      btn.classList.add('on');
      var sib=btn.parentElement.children;for(var i=1;i<sib.length;i++)sib[i].classList.remove('on');
      sel[t]=['全部'];

      var act=[];for(var i=1;i<sib.length;i++){if(sib[i].classList.contains('on'))act.push(sib[i].getAttribute('data-v'));}

function getFiltered(){

function calcGrowth(r){
  // Use pre-calculated g_eff_rate if available (only positive)
  if(r.g_eff_rate!==null&&r.g_eff_rate!==undefined&&r.g_eff_rate>0)return r.g_eff_rate;
  // Fallback: calculate from bl_eff (only positive growth)
  if(r.stu===null||r.stu===undefined||r.stu<=0)return null;
  var v=parseFloat(((r.eff-r.bl_eff)/r.stu*100).toFixed(2));
  return v>0?v:null;
}

    '<td style="'+TD+bg+';color:#333;font-weight:600">'+name+'</td>',
    '<td style="'+TD+bg+';color:#333">'+org+'</td>',
    '<td style="'+TD+bg+';color:'+eff_c+'">'+eff.toFixed(2)+'%</td>',
    '<td style="'+TD+bg+';color:'+hw_c+'">'+hw.toFixed(2)+'%</td>',
    '<td style="'+TD+bg+';color:'+hwc_c+'">'+hwc.toFixed(2)+'%</td>',
    '<td style="'+TD+bg+';color:'+grc_c+'">'+gr+'</td>'
  ];
  tr.innerHTML=cells.join('');
}
window.onload=function(){
  mkBtn('fgG',grades,'g');
  mkBtn('fgS',subjects,'s');
  mkBtn('fgL',lectures,'l');
  window.addEventListener('resize',function(){for(var k in C){if(C[k])C[k].resize();}});
  refreshAll();
  window.handleClick=handleClick;window.setM=setM;window.mkBtn=mkBtn;
};
</script>
