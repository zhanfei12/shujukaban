// 筛选状态
var filters = {
    org: '全部',
    grade: '全部',
    subject: '全部',
    lectures: ['全部']
};

// 单选/多选模式
var mode = 'single';

// 初始化筛选按钮
function initFilters() {
    // 运营中心
    var orgDiv = document.getElementById('orgBtns');
    var orgs = ['全部'].concat(D.orgs);
    orgs.forEach(function(o) {
        var btn = document.createElement('button');
        btn.textContent = o;
        btn.className = o === '全部' ? 'on' : '';
        btn.onclick = function() { setFilter('org', o, this); };
        orgDiv.appendChild(btn);
    });
    
    // 年级
    var gradeDiv = document.getElementById('gradeBtns');
    var grades = ['全部'].concat(D.grades);
    grades.forEach(function(g) {
        var btn = document.createElement('button');
        btn.textContent = g;
        btn.className = g === '全部' ? 'on' : '';
        btn.onclick = function() { setFilter('grade', g, this); };
        gradeDiv.appendChild(btn);
    });
    
    // 学科
    var subjectDiv = document.getElementById('subjectBtns');
    var subjects = ['全部'].concat(D.subjects);
    subjects.forEach(function(s) {
        var btn = document.createElement('button');
        btn.textContent = s;
        btn.className = s === '全部' ? 'on' : '';
        btn.onclick = function() { setFilter('subject', s, this); };
        subjectDiv.appendChild(btn);
    });
    
    // 讲次
    var lectureDiv = document.getElementById('lectureBtns');
    var lectures = ['全部'].concat(D.lectures);
    lectures.forEach(function(l) {
        var btn = document.createElement('button');
        btn.textContent = l;
        btn.className = l === '全部' ? 'on' : '';
        btn.onclick = function() { setLectureFilter(l, this); };
        lectureDiv.appendChild(btn);
    });
}

function setFilter(type, value, btn) {
    filters[type] = value;
    // 更新按钮状态
    var parent = btn.parentNode;
    for (var i = 0; i < parent.children.length; i++) {
        parent.children[i].className = '';
    }
    btn.className = 'on';
    refreshAll();
}

function setLectureFilter(value, btn) {
    if (mode === 'single') {
        // 单选模式
        filters.lectures = [value];
        var parent = btn.parentNode;
        for (var i = 0; i < parent.children.length; i++) {
            parent.children[i].className = '';
        }
        btn.className = 'on';
    } else {
        // 多选模式
        if (value === '全部') {
            filters.lectures = ['全部'];
            var parent = btn.parentNode;
            for (var i = 0; i < parent.children.length; i++) {
                parent.children[i].className = '';
            }
            btn.className = 'on';
        } else {
            // 移除"全部"
            var idx = filters.lectures.indexOf('全部');
            if (idx > -1) filters.lectures.splice(idx, 1);
            // 移除"全部"按钮的选中状态
            var parent = btn.parentNode;
            if (parent.children[0].className === 'on') {
                parent.children[0].className = '';
            }
            // 切换当前按钮
            var idx2 = filters.lectures.indexOf(value);
            if (idx2 > -1) {
                filters.lectures.splice(idx2, 1);
                btn.className = '';
            } else {
                filters.lectures.push(value);
                btn.className = 'on';
            }
            // 如果没有选中任何讲次，自动选"全部"
            if (filters.lectures.length === 0) {
                filters.lectures = ['全部'];
                parent.children[0].className = 'on';
            }
        }
    }
    refreshAll();
}

function setMode(m) {
    mode = m;
    document.getElementById('mS').className = m === 'single' ? 'on' : '';
    document.getElementById('mM').className = m === 'multi' ? 'on' : '';
    // 重置讲次筛选
    filters.lectures = ['全部'];
    var lectureDiv = document.getElementById('lectureBtns');
    for (var i = 0; i < lectureDiv.children.length; i++) {
        lectureDiv.children[i].className = i === 0 ? 'on' : '';
    }
    refreshAll();
}

// 获取筛选后的数据
function getFilteredData() {
    var records = D.records;
    
    // 筛选运营中心
    if (filters.org !== '全部') {
        records = records.filter(function(r) { return r.org === filters.org; });
    }
    
    // 筛选年级
    if (filters.grade !== '全部') {
        records = records.filter(function(r) { return r.grade === filters.grade; });
    }
    
    // 筛选学科
    if (filters.subject !== '全部') {
        records = records.filter(function(r) { return r.subject === filters.subject; });
    }
    
    // 筛选讲次
    if (filters.lectures.indexOf('全部') === -1) {
        records = records.filter(function(r) { return filters.lectures.indexOf(r.lecture) > -1; });
    }
    
    return records;
}

// 聚合数据：按(学科, 中心)汇总
function aggregateBySubjectOrg(records) {
    var agg = {};
    records.forEach(function(r) {
        var key = r.subject + '_' + r.org;
        if (!agg[key]) {
            agg[key] = { stu: 0, att: 0, eff: 0, hw_sub: 0, hw_corr: 0, growth: 0 };
        }
        agg[key].stu += r.stu;
        agg[key].att += r.att;
        agg[key].eff += r.eff;
        agg[key].hw_sub += r.hw_sub;
        agg[key].hw_corr += r.hw_corr;
    });
    
    // 计算增长率（需要从原始数据计算）
    // 这里简化处理：增长率为各记录的平均值
    var growthSum = {};
    var growthCount = {};
    records.forEach(function(r) {
        var key = r.subject + '_' + r.org;
        if (!growthSum[key]) {
            growthSum[key] = 0;
            growthCount[key] = 0;
        }
        growthSum[key] += r.growth;
        growthCount[key]++;
    });
    
    for (var key in agg) {
        if (growthCount[key] > 0) {
            agg[key].growth = growthSum[key] / growthCount[key];
        }
    }
    
    return agg;
}

// 刷新所有数据
function refreshAll() {
    var records = getFilteredData();
    var agg = aggregateBySubjectOrg(records);
    
    // 更新数据条
    updateDataBars('eff', agg);
    updateDataBars('hw', agg);
    updateDataBars('growth', agg);
    
    // 更新热力图
    updateHeatmap('eff', agg);
    updateHeatmap('hw', agg);
}

function updateDataBars(type, agg) {
    var prefix = type === 'eff' ? 'eff' : (type === 'hw' ? 'hw' : 'growth');
    
    D.subjects.forEach(function(subject) {
        D.orgs.forEach(function(org) {
            var key = subject + '_' + org;
            var data = agg[key];
            
            var valueEl = document.getElementById(prefix + '_' + key + '_val');
            var barEl = document.getElementById(prefix + '_' + key + '_bar');
            
            if (valueEl && barEl) {
                var val = 0;
                var percent = 0;
                
                if (data && data.stu > 0) {
                    if (type === 'eff') {
                        val = (data.eff / data.stu * 100).toFixed(2);
                        percent = Math.min(100, val);
                    } else if (type === 'hw') {
                        val = (data.hw_corr / data.stu * 100).toFixed(2);
                        percent = Math.min(100, val);
                    } else {
                        val = data.growth.toFixed(2);
                        percent = Math.min(100, Math.max(0, 50 + val)); // 增长率居中显示
                    }
                }
                
                valueEl.textContent = val + '%';
                barEl.style.width = percent + '%';
            }
        });
    });
}

function updateHeatmap(type, agg) {
    var tableId = type === 'eff' ? 'hmEff' : 'hmHw';
    var tbody = document.getElementById(tableId);
    
    // 清空表格
    tbody.innerHTML = '';
    
    // 为每个中心创建一行
    D.orgs.forEach(function(org, rowIdx) {
        var tr = document.createElement('tr');
        
        // 第一列：中心名称
        var tdOrg = document.createElement('td');
        tdOrg.textContent = org;
        tdOrg.style.fontWeight = 'bold';
        tr.appendChild(tdOrg);
        
        // 收集该行所有学科的值，用于排名
        var values = [];
        D.subjects.forEach(function(subject) {
            var key = subject + '_' + org;
            var data = agg[key];
            var val = 0;
            
            if (data && data.stu > 0) {
                if (type === 'eff') {
                    val = data.eff / data.stu * 100;
                } else {
                    val = data.hw_corr / data.stu * 100;
                }
            }
            
            values.push({
                subject: subject,
                val: val,
                hasData: data && data.stu > 0
            });
        });
        
        // 为每个学科创建单元格
        values.forEach(function(item, colIdx) {
            var td = document.createElement('td');
            
            if (item.hasData) {
                td.textContent = item.val.toFixed(2) + '%';
                
                // 着色：每列独立排名
                // 这里需要收集所有中心在该学科的值
                var colValues = [];
                D.orgs.forEach(function(o) {
                    var k = item.subject + '_' + o;
                    var d = agg[k];
                    if (d && d.stu > 0) {
                        var v = type === 'eff' ? d.eff / d.stu * 100 : d.hw_corr / d.stu * 100;
                        colValues.push({ org: o, val: v });
                    }
                });
                
                // 排序
                colValues.sort(function(a, b) { return b.val - a.val; });
                
                // 找到当前中心的排名
                var rank = -1;
                for (var i = 0; i < colValues.length; i++) {
                    if (colValues[i].org === org) {
                        rank = i;
                        break;
                    }
                }
                
                // 应用颜色
                if (rank === 0) {
                    td.className = 'g1'; // 绿色
                } else if (rank === 1) {
                    td.className = 'g2'; // 黄色
                } else if (rank === 2) {
                    td.className = 'g3'; // 红色
                }
            } else {
                td.textContent = '-';
                td.className = 'na';
            }
            
            tr.appendChild(td);
        });
        
        tbody.appendChild(tr);
    });
}

// 页面加载完成后初始化
window.onload = function() {
    initFilters();
    refreshAll();
};
