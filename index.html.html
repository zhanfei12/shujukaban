function handleClick(btn,t){
  if(mode==='single'){
    var sib=btn.parentElement.children;for(var i=0;i<sib.length;i++)sib[i].classList.remove('on');
    btn.classList.add('on');
    sel[t]=[btn.getAttribute('data-v')===''?'全部':btn.getAttribute('data-v')];
  }else{
    if(btn.getAttribute('data-v')===''){
      btn.classList.add('on');
      var sib=btn.parentElement.children;for(var i=1;i<sib.length;i++)sib[i].classList.remove('on');
      sel[t]=['全部'];

      var act=[];for(var i=1;i<sib.length;i++){if(sib[i].classList.contains('on'))act.push(sib[i].getAttribute('data-v'));}

function calcGrowth(r){

    else if(sortCol==='hwc'){va=a.hwc_r;vb=b.hwc_r;}
    else if(sortCol==='gr'){va=a.gr!==null?a.gr:0;vb=b.gr!==null?b.gr:0;}
    if(va<vb)return 1;if(va>vb)return-1;return 0;});
  var top20=Math.ceil(tutorList.length*0.2),bot20_start=Math.floor(tutorList.length*0.8);
  var tbody=document.getElementById('tbody');tbody.innerHTML='';
  for(var i=0;i<tutorList.length;i++){
    var d=tutorList[i];var tr=document.createElement('tr');
    var bg=i%2===0?bg1:bg2;
    var eff_c="#333",hw_c="#333",hwc_c="#333",grc_c="#333";
    if(i<top20){eff_c=hw_c=hwc_c=grc_c="#22863a";}else if(i>=bot20_start){eff_c=hw_c=hwc_c=grc_c="#c00";}
    var gr_s=d.gr!==null?d.gr.toFixed(2)+'%':'—';
    var gr_color='#666';
    if(d.gr!==null){if(d.gr>=5)gr_color='#c00';else if(d.gr>=2)gr_color='#e86909';else gr_color='#28a745';}
    buildRow(tr,i+1,d.grades,d.subjects,d.name,d.org,d.eff_r,d.hw_r,d.hwc_r,gr_s,bg,eff_c,hw_c,hwc_c,grc_c);
    tbody.appendChild(tr);
  }
  document.getElementById('tblCount').textContent=tutorList.length;
}
window.sortTable=function(col){
  if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=false;}
  refreshAll();
};
function buildRow(tr,idx,grades,subj,name,org,eff,hw,hwc,gr,bg,eff_c,hw_c,hwc_c,grc_c){
  var TD='padding:7px 10px;border-bottom:1px solid #eee;text-align:center;background:';
  var cells=[
    '<td style="'+TD+bg+';color:#333;font-weight:700">'+idx+'</td>',
    '<td style="'+TD+bg+';color:#333">'+grades+'</td>',
    '<td style="'+TD+bg+';color:#333">'+subj+'</td>',
    '<td style="'+TD+bg+';color:#333;font-weight:600">'+name+'</td>',
    '<td style="'+TD+bg+';color:#333">'+org+'</td>',
    '<td style="'+TD+bg+';color:'+eff_c+'">'+eff.toFixed(2)+'%</td>',
    '<td style="'+TD+bg+';color:'+hw_c+'">'+hw.toFixed(2)+'%</td>',
    '<td style="'+TD+bg+';color:'+hwc_c+'">'+hwc.toFixed(2)+'%</td>',
    '<td style="'+TD+bg+';color:'+grc_c+'">'+gr+'</td>'
  ];
  tr.innerHTML=cells.join('');
}
window.onload=function(){
  mkBtn('fgG',grades,'g');
  mkBtn('fgS',subjects,'s');
  mkBtn('fgL',lectures,'l');
  window.addEventListener('resize',function(){for(var k in C){if(C[k])C[k].resize();}});
  refreshAll();
  window.handleClick=handleClick;window.setM=setM;window.mkBtn=mkBtn;
};
